<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Materials | DentalPrep</title>
    <link rel="shortcut icon" type="image/x-icon" href="../static/images/favicon.png">
    <link rel="stylesheet" href="../static/css/DAstyles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-width: 280px; }
        body { background: #f3f4f6; font-family: 'Inter', sans-serif; }
        .dashboard-layout { display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid #e5e7eb; position: fixed; height: 100vh; padding: 1.5rem; display: flex; flex-direction: column; }
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 2rem; }
        .logo-area { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 3rem; text-decoration: none; }
        .nav-link { display: flex; align-items: center; gap: 1rem; padding: 1rem; border-radius: 0.75rem; color: #4b5563; text-decoration: none; transition: all 0.2s; margin-bottom: 0.5rem; font-weight: 500; }
        .nav-link:hover, .nav-link.active { background-color: #eff6ff; color: var(--primary-color); }
        .section-card { background: white; padding: 1.5rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .materials-grid { display: grid; gap: 1rem; margin-top: 1.5rem; }
        .material-card { border: 1px solid #e5e7eb; border-radius: 1rem; padding: 1.25rem; background: #fff; }
        .chip-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.75rem 0; }
        .chip { background: #eff6ff; color: var(--primary-color); border-radius: 999px; padding: 0.4rem 0.75rem; font-size: 0.85rem; font-weight: 600; }
        .empty-state { padding: 2rem; text-align: center; color: #6b7280; border: 1px dashed #d1d5db; border-radius: 1rem; margin-top: 1.5rem; }
        .btn-primary { background: var(--primary-color); color: white; border: none; padding: 0.7rem 1rem; border-radius: 0.75rem; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; }
        .sidebar-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0.5rem; color: var(--primary-color); position: fixed; top: 1rem; left: 1rem; z-index: 1001; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 999; }
        @media (max-width: 768px) { :root { --sidebar-width: 0; } .sidebar-toggle { display: block; } .sidebar { position: fixed; left: -280px; transition: left 0.3s ease; z-index: 1000; height: 100vh; overflow-y: auto; } .sidebar.active { left: 0; } .sidebar-overlay.active { display: block; } .main-content { margin-left: 0; padding: 1rem; } .materials-grid { grid-template-columns: 1fr; } }
        @media (max-width: 480px) { .section-card { padding: 1rem; } .logo-area { margin-bottom: 2rem; } .nav-link { padding: 0.75rem; font-size: 0.9rem; } .main-content { padding: 0.75rem; } .material-card { padding: 1rem; } .btn-primary { padding: 0.6rem 0.8rem; font-size: 0.9rem; } }
    </style>
</head>

<body>
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
        <i class="fas fa-bars"></i>
    </button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <a href="/" class="logo-area">
                <i class="fas fa-tooth" style="font-size: 2rem; color: var(--arterial-red);"></i>
                <div style="font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--venous-blue);">Dental<span style="color: var(--arterial-red);">Prep</span></div>
            </a>
            <nav>
                <a href="/dashboard/" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="/courses/" class="nav-link"><i class="fas fa-book-open"></i> My Courses</a>
                <a href="/materials/" class="nav-link active"><i class="fas fa-folder-open"></i> Study Materials</a>
                <a href="/assistant/" class="nav-link"><i class="fas fa-robot"></i> AI Assistant</a>
            </nav>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid #e5e7eb;">
                <a href="/" class="nav-link logout-link" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="section-card">
                <div style="display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; align-items: center;">
                    <div>
                        <h1 id="materials-title" style="font-size: 1.8rem; font-weight: 700;">Study Materials</h1>
                        <p id="materials-subtitle" style="color: #6b7280; margin-top: 0.35rem;">View or download lesson materials uploaded by the admin.</p>
                    </div>
                    <a id="materials-back-link" href="/courses/" class="btn-primary"><i class="fas fa-arrow-left"></i> Back</a>
                </div>
                <div id="materials-list" class="materials-grid"></div>
                <div id="materials-empty" class="empty-state" style="display: none;">No study materials found for this selection.</div>
            </div>
        </main>
    </div>

    <script src="../static/js/api.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const api = window.DentalPrepApi;
            if (!api || !api.requireAuth()) return;

            document.querySelectorAll(".logout-link").forEach((link) => {
                link.addEventListener("click", (event) => {
                    event.preventDefault();
                    api.clearToken();
                    window.location.href = "/login/";
                });
            });

            const params = new URLSearchParams(window.location.search);
            const courseId = params.get("courseId");
            const lessonId = params.get("lessonId");
            const titleEl = document.getElementById("materials-title");
            const subtitleEl = document.getElementById("materials-subtitle");
            const backLink = document.getElementById("materials-back-link");
            const listEl = document.getElementById("materials-list");
            const emptyEl = document.getElementById("materials-empty");

            if (lessonId) {
                backLink.href = `/video/?id=${encodeURIComponent(lessonId)}`;
            } else if (courseId) {
                backLink.href = `/course-player/?id=${encodeURIComponent(courseId)}`;
            }

            const query = new URLSearchParams();
            if (courseId) query.set("courseId", courseId);
            if (lessonId) query.set("lessonId", lessonId);

            try {
                const { materials } = await api.apiFetch(`/materials${query.toString() ? `?${query.toString()}` : ""}`);
                if (!materials.length) {
                    emptyEl.style.display = "block";
                    return;
                }

                const freeMaterials = materials.filter((item) => String(item.accessLevel || 'free') !== 'paid');
                const paidMaterials = materials.filter((item) => String(item.accessLevel || 'free') === 'paid');
                const renderGroup = (items, heading, paid) => {
                    if (!items.length) return "";
                    return `
                        <div style="grid-column: 1/-1; margin-top: 0.75rem; font-weight: 700; color: ${paid ? '#92400e' : '#166534'};">${heading}</div>
                        ${items.map((material) => `
                            <div class="material-card">
                                <div style="font-size: 1.1rem; font-weight: 700; color: #111827;">${material.title || material.fileName}</div>
                                <div style="color: #6b7280; margin-top: 0.4rem;">${material.courseTitle} • ${material.lessonTitle}</div>
                                <div class="chip-row">
                                    <span class="chip" style="background: ${paid ? '#fef3c7' : '#ecfdf3'}; color: ${paid ? '#92400e' : '#166534'};">${paid ? 'Paid Content' : 'Free Demo'}</span>
                                    ${(material.curriculumTags || []).map((tag) => `<span class="chip">${tag}</span>`).join("")}
                                </div>
                                ${material.isLocked || !material.fileUrl
                                    ? '<div style="margin-top:0.75rem; color:#92400e; font-weight:600;"><i class="fas fa-lock"></i> Paid material. Upgrade to access.</div>'
                                    : `<div style="display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.75rem;"><a href="${material.fileUrl}" target="_blank" rel="noopener noreferrer" class="btn-primary">Open</a><a href="${material.fileUrl}" download class="btn-primary">Download</a></div>`}
                            </div>
                        `).join("")}
                    `;
                };

                titleEl.textContent = lessonId ? "Lesson Materials" : courseId ? "Course Materials" : "Study Materials";
                subtitleEl.textContent = lessonId ? "Files attached to the selected lesson." : courseId ? "Files uploaded across lessons in this course." : "Files available across your LMS content.";
                listEl.innerHTML = `${renderGroup(freeMaterials, 'Free Demo', false)}${renderGroup(paidMaterials, 'Paid Content', true)}`;
            } catch (err) {
                emptyEl.style.display = "block";
                emptyEl.textContent = err.message || "Unable to load materials.";
            }

            // Mobile sidebar toggle
            const sidebarToggle = document.getElementById("sidebar-toggle");
            const sidebarOverlay = document.getElementById("sidebar-overlay");
            const sidebar = document.getElementById("sidebar");
            const navLinks = document.querySelectorAll(".nav-link");

            const closeSidebar = () => {
                sidebar.classList.remove("active");
                sidebarOverlay.classList.remove("active");
            };

            sidebarToggle?.addEventListener("click", () => {
                sidebar.classList.toggle("active");
                sidebarOverlay.classList.toggle("active");
            });

            sidebarOverlay?.addEventListener("click", closeSidebar);

            navLinks.forEach(link => {
                link.addEventListener("click", closeSidebar);
            });
        });
    </script>
</body>

</html>
