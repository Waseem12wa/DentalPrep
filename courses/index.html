<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>All Courses | DentalPrep</title>
    <link rel="shortcut icon" type="image/x-icon" href="../static/images/favicon.png">
    <link rel="stylesheet" href="../static/css/DAstyles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 280px;
        }

        body {
            background-color: #f3f4f6;
            font-family: 'Inter', sans-serif;
        }

        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid #e5e7eb;
            position: fixed;
            height: 100vh;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 2rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 3rem;
            text-decoration: none;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-radius: 0.75rem;
            color: #4b5563;
            text-decoration: none;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: #eff6ff;
            color: var(--primary-color);
        }

        .nav-link i {
            width: 24px;
        }

        /* Grid Layout for Courses */
        .courses-grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .course-item {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
            border: 1px solid #e5e7eb;
        }

        .course-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .course-thumb {
            height: 180px;
            background: #f3f4f6;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .course-info {
            padding: 1.5rem;
        }

        .course-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #6b7280;
            font-size: 0.875rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e5e7eb;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .section-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .section-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-top: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .empty-state {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            color: #6b7280;
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .quiz-item {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 1rem;
            padding: 1.25rem;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.7rem 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-secondary {
            background: #eff6ff;
            color: var(--primary-color);
            border: 1px solid #bfdbfe;
            padding: 0.7rem 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            margin-top: 0.75rem;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-top: 0.9rem;
        }

        .tag-chip {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
            background: #eff6ff;
            color: var(--primary-color);
            font-size: 0.8rem;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="/" class="logo-area">
                <i class="fas fa-tooth" style="font-size: 2rem; color: var(--arterial-red);"></i>
                <div
                    style="font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--venous-blue);">
                    Dental<span style="color: var(--arterial-red);">Prep</span>
                </div>
            </a>

            <nav>
                <a href="../dashboard/" class="nav-link">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
                <a href="#" class="nav-link active">
                    <i class="fas fa-book-open"></i> My Courses
                </a>
                <a href="../materials/" class="nav-link">
                    <i class="fas fa-folder-open"></i> Materials
                </a>
                <a href="../assistant/" class="nav-link">
                    <i class="fas fa-robot"></i> AI Assistant
                </a>
            </nav>

            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid #e5e7eb;">
                <a href="/" class="nav-link logout-link" style="color: #ef4444;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="section-header-row">
                <div>
                    <h1 style="font-size: 1.8rem; font-weight: 700;">My Courses</h1>
                    <p style="color: #6b7280; margin-top: 0.35rem;">Browse database-driven courses, quizzes, study materials, audio lessons, and case studies.</p>
                </div>
                <div style="position: relative;">
                    <input id="course-search" type="text" placeholder="Search courses..."
                        style="padding: 0.75rem 1rem 0.75rem 2.5rem; border-radius: 0.5rem; border: 1px solid #e5e7eb; width: 300px;">
                    <i class="fas fa-search" style="position: absolute; left: 1rem; top: 1rem; color: #9ca3af;"></i>
                </div>
            </div>

            <div id="courses-loader" class="empty-state">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 0.75rem;"></i>
                <p>Loading courses...</p>
            </div>

            <div id="courses-empty" class="empty-state" style="display: none;">No courses available yet.</div>

            <div id="courses-grid" class="courses-grid-layout" style="display: none;"></div>

            <div class="section-card">
                <div class="section-header-row" style="margin-bottom: 0;">
                    <h2 style="font-size: 1.4rem; font-weight: 700;">Available Quizzes</h2>
                    <a href="../learning/" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Open Learning Hub</a>
                </div>

                <div id="quizzes-loader" class="empty-state" style="margin-top: 1rem; background: #f8fafc;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 0.75rem;"></i>
                    <p>Loading quizzes...</p>
                </div>

                <div id="quizzes-empty" class="empty-state" style="display: none; margin-top: 1rem;">No quizzes available yet.</div>

                <div id="quizzes-grid" class="quiz-grid" style="display: none;"></div>
            </div>
        </main>
    </div>

    <script src="../static/js/api.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const api = window.DentalPrepApi;
            const logoutLinks = document.querySelectorAll(".logout-link");
            logoutLinks.forEach((link) => {
                link.addEventListener("click", (event) => {
                    event.preventDefault();
                    if (api) {
                        api.clearToken();
                    } else {
                        localStorage.removeItem("dentalprep_token");
                    }
                    window.location.href = "/login/";
                });
            });

            if (!api || !api.requireAuth()) {
                return;
            }

            const coursesLoader = document.getElementById("courses-loader");
            const coursesEmpty = document.getElementById("courses-empty");
            const coursesGrid = document.getElementById("courses-grid");
            const quizzesLoader = document.getElementById("quizzes-loader");
            const quizzesEmpty = document.getElementById("quizzes-empty");
            const quizzesGrid = document.getElementById("quizzes-grid");
            const searchInput = document.getElementById("course-search");

            const palette = [
                ["#1e3a8a", "#3b82f6", "fa-tooth", "BDS Year 1"],
                ["#dc143c", "#ef4444", "fa-tools", "BDS Year 3"],
                ["#059669", "#34d399", "fa-microscope", "BDS Year 2"],
                ["#7c3aed", "#a855f7", "fa-book-medical", "Core Module"],
                ["#0f766e", "#14b8a6", "fa-stethoscope", "Study Track"]
            ];

            const escapeHtml = (value) => String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");

            const courseSummary = (course) => {
                const parts = [
                    `${course.lessonsCount || 0} lessons`,
                    `${course.quizCount || 0} quizzes`,
                    `${course.audioCount || 0} audio files`,
                    `${course.materialsCount || 0} materials`,
                    `${course.caseStudiesCount || 0} case studies`
                ];
                return parts.join(" • ");
            };

            try {
                const [coursesData, quizzesData, lessonsData] = await Promise.all([
                    api.apiFetch("/courses"),
                    api.apiFetch("/quizzes"),
                    api.apiFetch("/lessons")
                ]);

                const courses = coursesData.courses || [];
                const quizzes = quizzesData.quizzes || [];
                const lessons = lessonsData.lessons || [];
                const lessonLookup = lessons.reduce((acc, lesson) => {
                    acc[lesson.id] = lesson;
                    return acc;
                }, {});
                const courseLookup = courses.reduce((acc, course) => {
                    acc[course.id] = course;
                    return acc;
                }, {});

                const renderCourses = (items) => {
                    coursesGrid.innerHTML = "";

                    if (items.length === 0) {
                        coursesGrid.style.display = "none";
                        coursesEmpty.style.display = "block";
                        coursesEmpty.textContent = courses.length === 0
                            ? "No courses available yet."
                            : "No courses match your search.";
                        return;
                    }

                    coursesEmpty.style.display = "none";
                    coursesGrid.style.display = "grid";

                    items.forEach((course, index) => {
                        const [from, to, icon, badge] = palette[index % palette.length];
                        const card = document.createElement("div");
                        card.className = "course-item";
                        card.innerHTML = `
                            <div class="course-thumb" style="background: linear-gradient(135deg, ${from}, ${to});">
                                <i class="fas ${icon}" style="font-size: 4rem; color: white; opacity: 0.8;"></i>
                                <span class="badge">${escapeHtml(course.category || badge)}</span>
                            </div>
                            <div class="course-info">
                                <h3 style="font-weight: 700; font-size: 1.25rem; margin-bottom: 0.5rem; color: #111827;">${escapeHtml(course.title || "Untitled Course")}</h3>
                                <p style="color: #6b7280; font-size: 0.9375rem; line-height: 1.5;">${escapeHtml(course.description || courseSummary(course))}</p>
                                <div class="tag-row">
                                    ${(course.curriculumTags || []).slice(0, 4).map((tag) => `<span class="tag-chip">${escapeHtml(tag)}</span>`).join("")}
                                </div>
                                <div class="course-meta">
                                    <div class="meta-item"><i class="fas fa-video"></i> ${course.lessonsCount || 0} Lessons</div>
                                    <div class="meta-item"><i class="fas fa-file-alt"></i> ${course.quizCount || 0} Quizzes</div>
                                </div>
                                <div class="course-meta" style="margin-top: 0.75rem; padding-top: 0; border-top: none;">
                                    <div class="meta-item"><i class="fas fa-folder-open"></i> ${course.materialsCount || 0} Materials</div>
                                    <div class="meta-item"><i class="fas fa-headphones"></i> ${course.audioCount || 0} Audio</div>
                                    <div class="meta-item"><i class="fas fa-user-doctor"></i> ${course.caseStudiesCount || 0} Cases</div>
                                </div>
                                <div class="tag-row">
                                    <span class="tag-chip">Progress ${course.progress || 0}%</span>
                                </div>
                                <a href="/course-player/?id=${course.id}" class="btn-primary">Continue Learning</a>
                                <a href="/materials/?courseId=${course.id}" class="btn-secondary">Open Materials</a>
                            </div>
                        `;
                        coursesGrid.appendChild(card);
                    });
                };

                coursesLoader.style.display = "none";
                renderCourses(courses);

                if (searchInput) {
                    searchInput.addEventListener("input", (event) => {
                        const query = event.target.value.trim().toLowerCase();
                        const filtered = courses.filter((course) =>
                            [course.title, course.description, course.category, ...(course.curriculumTags || [])]
                                .filter(Boolean)
                                .some((field) => String(field).toLowerCase().includes(query))
                        );
                        renderCourses(filtered);
                    });
                }

                quizzesLoader.style.display = "none";
                quizzesGrid.innerHTML = "";

                if (quizzes.length === 0) {
                    quizzesEmpty.style.display = "block";
                } else {
                    quizzesEmpty.style.display = "none";
                    quizzesGrid.style.display = "grid";
                    quizzes.forEach((quiz) => {
                        const lesson = lessonLookup[quiz.lessonId];
                        const course = courseLookup[quiz.courseId];
                        const quizCard = document.createElement("div");
                        quizCard.className = "quiz-item";
                        quizCard.innerHTML = `
                            <div style="font-size: 1.1rem; font-weight: 700; color: #111827;">${escapeHtml(quiz.title || "Untitled Quiz")}</div>
                            <div style="color: #6b7280; margin-top: 0.5rem; line-height: 1.5;">${escapeHtml(course?.title || "Course")} • ${escapeHtml(lesson ? lesson.title : "Lesson")} • ${quiz.questions || 0} questions</div>
                            <div class="tag-row">
                                <span class="tag-chip">${quiz.bestScore == null ? "No attempts yet" : `Best score ${quiz.bestScore}%`}</span>
                            </div>
                            <a href="/quiz/?id=${quiz.id}" class="btn-primary">${quiz.bestScore == null ? "Start Quiz" : "Retake Quiz"}</a>
                        `;
                        quizzesGrid.appendChild(quizCard);
                    });
                }
            } catch (err) {
                console.error("Failed to load student course portal:", err);
                coursesLoader.innerHTML = '<p>Unable to load courses.</p>';
                quizzesLoader.innerHTML = '<p>Unable to load quizzes.</p>';
            }
        });
    </script>
</body>

</html>
